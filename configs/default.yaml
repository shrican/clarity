model:
  backbone: convnextv2_tiny  # timm model name; V2 has GRN for better feature diversity
  pretrained: true
  num_classes: 2
  dropout: 0.3
  freq_branch: true         # enable frequency/Laplacian feature branch
  cbam_reduction: 16

dataset:
  # Stage 1 (pretraining): synthetic blur from Unsplash pairs
  pretrain_dataset: wtcherr/unsplash_10k_blur_rand_KS
  # Stage 2 (fine-tuning): real blur labels from CUHK + Flickr-Blur
  finetune_datasets:
    - chitradrishti/cuhk-blur
    - chitradrishti/Flickr-Blur
  image_size: 224
  val_split: 0.15
  test_split: 0.10
  num_workers: 4
  cache_dir: ./data/.cache

training:
  epochs: 30
  batch_size: 32
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 3
  focal_alpha: 0.25
  focal_gamma: 2.0
  label_smoothing: 0.1
  grad_clip: 1.0
  aux_loss_weight: 0.3    # weight for auxiliary regression loss
  # Mixup disabled: mixing images corrupts high-freq edge statistics (sharpness signal)
  # Use only 0.0 or very small alpha for blur detection
  mixup_alpha: 0.0
  progressive_sizes: [128, 192, 224]  # progressive resizing schedule

eval:
  tta: true               # test-time augmentation
  tta_n: 5
  threshold: 0.5

inference:
  device: mps
  checkpoint: checkpoints/best.pt
  api_host: 0.0.0.0
  api_port: 8000
