model:
  backbone: convnext_tiny  # timm model name
  pretrained: true
  num_classes: 2
  dropout: 0.3
  freq_branch: true         # enable frequency/Laplacian feature branch
  cbam_reduction: 16

dataset:
  name: wtcherr/unsplash_10k_blur_rand_KS
  image_size: 224
  val_split: 0.15
  test_split: 0.10
  num_workers: 4
  cache_dir: ./data/.cache

training:
  epochs: 30
  batch_size: 32
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 3
  focal_alpha: 0.25
  focal_gamma: 2.0
  label_smoothing: 0.1
  grad_clip: 1.0
  aux_loss_weight: 0.3    # weight for auxiliary regression loss
  mixup_alpha: 0.4
  progressive_sizes: [128, 192, 224]  # progressive resizing schedule

eval:
  tta: true               # test-time augmentation
  tta_n: 5
  threshold: 0.5

inference:
  device: mps
  checkpoint: checkpoints/best.pt
  api_host: 0.0.0.0
  api_port: 8000
